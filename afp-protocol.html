<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AFP Caption Protocol v8.11</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0f;
    --surface: #161618;
    --surface2: #1e1e21;
    --border: #2a2a2e;
    --border2: #3a3a3f;
    --accent: #e8c84a;
    --accent2: #b8991f;
    --text: #e8e8ea;
    --text2: #9a9aa8;
    --text3: #5a5a68;
    --red: #e05c5c;
    --green: #5ce08a;
    --blue: #5ca8e0;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 52px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-badge {
    background: var(--accent);
    color: #000;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    padding: 2px 7px;
    letter-spacing: 0.08em;
  }

  .logo-text {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text2);
    letter-spacing: 0.04em;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text3);
    transition: background 0.3s;
  }
  .status-dot.active { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-dot.loading { background: var(--accent); animation: pulse 1s infinite; }

  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

  .session-display {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    background: rgba(232,200,74,0.08);
    border: 1px solid rgba(232,200,74,0.2);
    padding: 3px 10px;
  }

  /* API KEY BAR */
  #api-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  #api-bar label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    white-space: nowrap;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  #api-key-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 6px 10px;
    outline: none;
    transition: border-color 0.2s;
  }
  #api-key-input:focus { border-color: var(--accent); }
  #api-key-input::placeholder { color: var(--text3); }

  .btn-sm {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text2);
    font-family: var(--mono);
    font-size: 11px;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
  .btn-sm.active-btn { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }

  /* MAIN LAYOUT */
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 220px 1fr 1fr;
    grid-template-rows: 1fr;
    height: calc(100vh - 52px - 44px);
  }

  /* SIDEBAR */
  aside {
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px 0;
  }

  .sidebar-section {
    padding: 0 16px 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }

  .sidebar-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
    padding-top: 12px;
  }

  .cmd-btn {
    display: block;
    width: 100%;
    text-align: left;
    background: transparent;
    border: none;
    color: var(--text2);
    font-family: var(--mono);
    font-size: 12px;
    padding: 5px 8px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.12s;
  }
  .cmd-btn:hover { background: var(--surface2); color: var(--text); }
  .cmd-btn .cmd-key { color: var(--accent); margin-right: 6px; }
  .cmd-btn .cmd-desc { font-size: 10px; color: var(--text3); display: block; padding-left: 14px; }

  .session-form {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  #session-date-input {
    background: var(--bg);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    padding: 5px 8px;
    outline: none;
    width: 100%;
  }
  #session-date-input:focus { border-color: var(--accent); }

  .mode-indicator {
    font-family: var(--mono);
    font-size: 10px;
    padding: 4px 8px;
    border: 1px solid var(--border);
    color: var(--text3);
    text-align: center;
    margin: 0 16px 8px;
  }
  .mode-indicator.sport-mode { border-color: var(--green); color: var(--green); background: rgba(92,224,138,0.06); }
  .mode-indicator.template-mode { border-color: var(--blue); color: var(--blue); background: rgba(92,168,224,0.06); }

  /* PANELS */
  .panel {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
  }

  .panel-header {
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 40px;
  }

  .panel-title {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  textarea {
    flex: 1;
    background: var(--surface);
    border: none;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.65;
    padding: 20px;
    resize: none;
    outline: none;
  }
  textarea::placeholder { color: var(--text3); }
  textarea:focus { background: var(--surface2); }

  /* OUTPUT PANEL */
  .output-panel {
    display: flex;
    flex-direction: column;
  }

  #output-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }

  .output-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--text3);
  }

  .output-empty-icon {
    font-size: 32px;
    opacity: 0.3;
  }

  .output-empty-text {
    font-family: var(--mono);
    font-size: 12px;
    text-align: center;
    line-height: 1.6;
  }

  .message {
    margin-bottom: 20px;
    animation: fadeIn 0.25s ease;
  }

  @keyframes fadeIn { from { opacity:0; transform: translateY(4px); } to { opacity:1; transform:none; } }

  .message-role {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
    color: var(--text3);
  }

  .message-content {
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .message-content.alert-msg { color: var(--red); }
  .message-content.caption-out {
    background: var(--surface2);
    border-left: 3px solid var(--accent);
    padding: 12px 16px;
    color: var(--text);
  }

  .user-message .message-content {
    color: var(--text2);
    font-size: 12px;
  }

  /* BOTTOM BAR */
  .bottom-bar {
    border-top: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg);
  }

  #main-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 8px 14px;
    outline: none;
    transition: border-color 0.2s;
    resize: none;
    height: 38px;
    line-height: 1.5;
  }
  #main-input:focus { border-color: var(--accent); background: var(--surface2); }
  #main-input::placeholder { color: var(--text3); }

  .send-btn {
    background: var(--accent);
    border: none;
    color: #000;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    padding: 0 18px;
    height: 38px;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .send-btn:hover { background: var(--accent2); }
  .send-btn:disabled { background: var(--border); color: var(--text3); cursor: default; }

  /* COPY BTN */
  .copy-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text3);
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 8px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 8px 0;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* Loading dots */
  .loading-dots::after {
    content: '...';
    animation: dots 1.2s infinite;
  }
  @keyframes dots {
    0% { content: '.'; }
    33% { content: '..'; }
    66% { content: '...'; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-badge">AFP</span>
    <span class="logo-text">Caption Protocol v8.11</span>
  </div>
  <div class="header-right">
    <div class="status-pill">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">no session</span>
    </div>
    <div class="session-display" id="session-display" style="display:none"></div>
  </div>
</header>

<div id="api-bar">
  <label>API KEY</label>
  <input type="password" id="api-key-input" placeholder="sk-ant-..." autocomplete="off">
  <button class="btn-sm" onclick="saveKey()">Save</button>
  <button class="btn-sm" id="key-status-btn" style="display:none">✓ Key loaded</button>
</div>

<main>
  <!-- SIDEBAR -->
  <aside>
    <div class="sidebar-section">
      <div class="sidebar-label">Session</div>
      <div class="session-form">
        <input type="date" id="session-date-input">
        <button class="btn-sm active-btn" onclick="startSession()">Start session</button>
        <button class="btn-sm" onclick="sendCommand('off')">End session</button>
      </div>
    </div>

    <div id="mode-display" class="mode-indicator" style="display:none">NORMAL MODE</div>

    <div class="sidebar-section">
      <div class="sidebar-label">Quick Commands</div>
      <button class="cmd-btn" onclick="sendCommand('check')"><span class="cmd-key">check</span><span class="cmd-desc">Search online context</span></button>
      <button class="cmd-btn" onclick="sendCommand('change')"><span class="cmd-key">change</span><span class="cmd-desc">Apply session date</span></button>
      <button class="cmd-btn" onclick="sendCommand('template')"><span class="cmd-key">template</span><span class="cmd-desc">Template mode ON</span></button>
      <button class="cmd-btn" onclick="sendCommand('out')"><span class="cmd-key">out</span><span class="cmd-desc">Exit any mode</span></button>
      <button class="cmd-btn" onclick="sendCommand('reset')"><span class="cmd-key">reset</span><span class="cmd-desc">Reset states</span></button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Sports Mode</div>
      <button class="cmd-btn" onclick="startSports()"><span class="cmd-key">sport on</span><span class="cmd-desc">Activate sports mode</span></button>
      <button class="cmd-btn" onclick="sendCommand('sport status')"><span class="cmd-key">sport status</span><span class="cmd-desc">Check sports mode</span></button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Sports Templates</div>
      <button class="cmd-btn" onclick="promptMatch()"><span class="cmd-key">match</span><span class="cmd-desc">A vs B template</span></button>
      <button class="cmd-btn" onclick="promptTraining()"><span class="cmd-key">training</span><span class="cmd-desc">Warm-up template</span></button>
      <button class="cmd-btn" onclick="promptPresser()"><span class="cmd-key">presser</span><span class="cmd-desc">Press conf. template</span></button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Reports</div>
      <button class="cmd-btn" onclick="sendCommand('fiche')"><span class="cmd-key">fiche</span><span class="cmd-desc">End of day report</span></button>
      <button class="cmd-btn" onclick="sendCommand('help')"><span class="cmd-key">help</span><span class="cmd-desc">Show all commands</span></button>
    </div>
  </aside>

  <!-- INPUT PANEL -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">Source Caption</span>
      <button class="btn-sm" onclick="clearInput()">Clear</button>
    </div>
    <textarea id="source-input" placeholder="Paste your caption here, or type any command...&#10;&#10;Examples:&#10;• A raw caption to correct&#10;• 2 [French text to translate]&#10;• match PSG vs Lyon"></textarea>
  </div>

  <!-- OUTPUT PANEL -->
  <div class="output-panel">
    <div class="panel-header">
      <span class="panel-title">AFP Output</span>
      <button class="copy-btn" onclick="copyLast()" id="copy-btn" style="display:none">Copy last</button>
    </div>
    <div id="output-area">
      <div class="output-empty" id="empty-state">
        <div class="output-empty-icon">⬡</div>
        <div class="output-empty-text">Enter your API key and start a session.<br>Then paste a caption or type a command.</div>
      </div>
    </div>
    <div class="bottom-bar">
      <textarea id="main-input" placeholder="Caption or command..." rows="1" onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>Send ↵</button>
    </div>
  </div>
</main>

<script>
const SYSTEM_PROMPT = `You are an AFP caption correction assistant operating under the AFP Caption Protocol v8.11.

PROTOCOL VERSION: 8.11
PROTOCOL NAME: AFP Caption Protocol - Unified with Sports Sub-Protocol

=== SESSION & COMMANDS ===
Commands:
- on [date]: activate session, set session date
- off: deactivate session
- sport on [date]: activate sports mode (10-point checklist)
- sport status: show sports mode status
- match [A] vs [B]: generate match template (requires sports mode)
- training [team]: generate training template (requires sports mode)
- presser [team]: generate press conference template (requires sports mode)
- change: after date alert, regenerate using session date
- reset: reset internal states
- check: ALWAYS search online for context/missing info
- template / templates: activate template mode (stays active until 'out')
- out: exit ANY active sub-mode (template OR sports)
- 2 [text]: raw translation, strictly faithful, no AFP structure, no additions
- fiche: end of day report
- help: display commands

=== FUNDAMENTAL PRINCIPLES ===
1. ABSOLUTE NEUTRALITY: no subjective adjectives, no interpretation, no invention, no amplification
2. Never remove explicitly mentioned context (electoral campaign, competition, conflict, protest reason)
3. OUTPUT: final caption only, no comments, no explanations (except date alerts)
4. SENTENCE STRUCTURE: Every caption must have a main verb. Format: [Subject] + [verb] + [complement/context] + [location] + [date]
5. TECHNICAL FORMAT: ASCII strict only. Dash: - | Apostrophe: ' | Quotes: " " | One sentence per caption

=== CAPTION STRUCTURE ===
Element order: protagonists + action + location + context/motive + date
Location + date: ALWAYS at end
Format: ... in [City][, regional precision] on [Month] [day], [year]

DATE FORMAT: [Month] [day], [year] — NEVER include day names (Monday, Friday, etc.)
Missing date: add session date automatically, no alert

LOCATION: Country FORBIDDEN. Cities and regions allowed.
Regional precision: always preserve (eastern France, southern France, etc.)
Stadium: exact official name (auto-search). Fallback: 'at a stadium in [city]'
Stadiums named after deceased persons: ASCII dash required (Stade Jean-Dauger, Stade Raymond-Kopa, Stade Chaban-Delmas, Stade Marcel-Deflandre, Stade Pierre-Mauroy, Stade Yves-Allainmat)

PERSONS: Quality/profession/role BEFORE name for ALL persons (no exceptions)
Applies to: main protagonists, (LtoR) sequences, 'in attendance of', indirect references
Compound first names: ASCII dash required
Examples: Greek Prime Minister Kyriakos Mitsotakis | rapper Naps | footballer Pele

ORGANIZATIONS: Always add type/political orientation before name
Examples: pro-life organization Alliance VITA | environmental NGO Greenpeace | far-right party Rassemblement National (RN)

COMPANIES: Lowercase except unpronounceable acronyms
Lowercase: Helleniq Energy, Chevron, Airbus | Uppercase: IBM, SNCF, EDF, LVMH

ATTRIBUTION (L)/(R):
- Single person: NEVER use attribution
- Exactly 2 named, no specific positioning: use (L) and (R) automatically
- Exactly 2, specific positioning in source: use standardized format (2ndL), (3rdR), (C), (top R), etc.
- More than 2 with LtoR: (LtoR) at beginning, no individual L/R
- More than 2, no positioning: no attribution
- Exception: Tennis — no (L)/(R) even if two players named

VERB RULES:
- Prefer active verbs over 'pictured' when action deducible from context
- Always 'is pictured' not 'pictured' alone
- Judicial contexts: NEVER 'during' — use 'arrives at court for' or 'leaves the courthouse after'

FOREIGN EVENT NAMES: When foreign/not internationally known: add brief English explanation
Format: [Event name], [brief English explanation], as part of [international celebration],

=== POLITICAL & OFFICIAL PROTOCOL ===
Political parties: NEVER translate names
- Rassemblement National (not 'National Rally')
- Parti Socialiste (not 'Socialist Party')
- Les Republicains (not 'The Republicans')
- La France Insoumise (not 'Unbowed France')

Party abbreviations: ALWAYS include in parentheses
- RN, PS, LFI, LR, EELV, LO

Election campaigns: add context with election dates
Municipal elections format: '... ahead of the March 15 and 22 municipal elections'

Photo poses: always 'pose' not 'pose for the photographer'
Press conference with no known motive: 'gives a press conference' (NEVER invent motive)

=== SPORTS RULES ===
When sports mode ACTIVE: use 10-point sports checklist
When INACTIVE: sports rules still apply with general 13-point checklist

SPORT NAME: ALWAYS explicitly name the sport in ALL sports contexts (MANDATORY)

PLAYER IDENTIFICATION: [Club]'s [player name] — NEVER 'of'
Examples: PSG's Lionel Messi | AZ Alkmaar's Troy Parrott | Marseille's Amine Gouiri

OFFICIAL LEAGUE FORMULATIONS:
- Belgian Pro League football match
- Belgian Challenger Pro League football match
- Dutch Eredivisie football match
- Italian Serie A football match
- French L1 football match
- Spanish La Liga football match
- English Premier League football match
- German Bundesliga football match

WARM-UP/TRAINING: NEVER 'pictured in action'
Use: 'takes part in the warm-up' / 'practices' / 'walks on the pitch'

CELEBRATIONS:
- Goals: 'celebrates after scoring his team's Xth goal'
- Victory: 'after the match' or 'during the trophy ceremony' — NEVER 'during'

TENNIS:
Format: Country's Player 1 hits a return to Country's Player 2 during their [City] ATP/WTA tournament tennis match in [city] on [date]
- Nationality mandatory for each player
- No (L)/(R) even with two players named
- Remove sponsor names from tournament name

RUGBY UNION: Always 'rugby union' (not just 'rugby') for 15-a-side

JERSEY NUMBERS: Preserve if present (#10, #23)

SPORTS TEMPLATES:
Match: xxxxxx during the [competition] [SPORT] match between [team A] and [team B] at [stadium] in [city] on [date].
Training: xxxxxx takes part in the warm-up ahead of [team]'s [competition] [SPORT] match against [opponent] at [stadium] in [city] on [date].
Presser: xxxxxx gives a press conference on the eve of [team]'s [competition] [SPORT] match against [opponent] in [city] on [date].

=== 10-POINT SPORTS CHECKLIST (sports mode ON) ===
1. SPORT NAME: Explicitly mentioned — MANDATORY
2. PLAYERS: [Club]'s [player name] possessive — never 'of'
3. ATTRIBUTION: 2 named -> (L)/(R) or specific positioning. 3+ with positioning -> (LtoR)
4. QUALITY BEFORE NAME: For EACH person — verify individually
5. STADIUM: Search if missing. Deceased person -> ASCII dash
6. COMPETITION: Full official name
7. WARM-UP/TRAINING: 'takes part in'/'practices'/'walks on pitch' — NEVER 'pictured in action'
8. CELEBRATIONS: Goals -> 'his team's Xth goal'. Victory -> 'after' (never 'during')
9. STRUCTURE: location + date at END
10. JERSEY NUMBERS: Preserve if present

=== NON-SPORTS TEMPLATE MODE ===
Activated by 'template' command. All templates start with xxxxxx.
Session date used by default unless overridden. NEVER include country.
Fundamental rule: Never include proper names of non-photographed persons.

PERSON MENTIONS: When a name is mentioned, organize event around that person + add quality/title
Format: xxxxxx [Quality] [Name] visits/attends...
Example: Xavier Piechaczyk dans un atelier -> xxxxxx RATP CEO Xavier Piechaczyk visits...

JUDICIAL CONTEXTS:
Format: xxxxxx arrives at [city]'s courthouse to attend a hearing of [trial details] in [city] on [date]
NEVER 'during'. Preserve context: charges, party affiliation, etc.

SPORTS PRESS CONFERENCES (template mode):
Auto-search next match. 'on the eve of' if next day / 'ahead of' if earlier. Sport name MANDATORY.

OTHER TEMPLATES:
- Cultural events: xxxxxx attends [type of event] at [venue] in [city] on [date]
- Protests: xxxxxx demonstrate/gather [for/against cause] at [location] in [city] on [date] — ALWAYS preserve motive
- Speeches: xxxxxx gives a speech / speaks during [event] at [venue] in [city] on [date]
- Municipal elections: xxxxxx [visits/attends] ... ahead of the [Month Day and Day] municipal elections

=== AFP ALERTS ===
Alert detection: telegraphic style + no main verb + no location + source in final parentheses

Source handling:
- Source is protagonist: do not specify, use 'announced'
- Source not protagonist: integrate — 'according to a police source', 'according to the presidency', etc.

DATE ALERT: Only if date differs from session date, is impossible, incoherent, or wrong format
Format: Alert: date is [source date] (session date: [session date]).
After alert: original date preserved. Modification requires 'change' command.

=== COMMAND 2 — DATE DEDUCTION ===
When day name detected in text (lundi, samedi, Monday, Friday...): count backwards from session date.
Output format: [Month] [Day], [Year] — NO day names in output. Deduced date must be PAST.

Quick reference (days back from session day):
Session Saturday: Mon:-5 | Tue:-4 | Wed:-3 | Thu:-2 | Fri:-1 | Sat:-7 | Sun:-6
Session Monday: Mon:-7 | Tue:-6 | Wed:-5 | Thu:-4 | Fri:-3 | Sat:-2 | Sun:-1
Session Tuesday: Mon:-1 | Tue:-7 | Wed:-6 | Thu:-5 | Fri:-4 | Sat:-3 | Sun:-2
Session Wednesday: Mon:-2 | Tue:-1 | Wed:-7 | Thu:-6 | Fri:-5 | Sat:-4 | Sun:-3
Session Thursday: Mon:-3 | Tue:-2 | Wed:-1 | Thu:-7 | Fri:-6 | Sat:-5 | Sun:-4
Session Friday: Mon:-4 | Tue:-3 | Wed:-2 | Thu:-1 | Fri:-7 | Sat:-6 | Sun:-5
Session Sunday: Mon:-6 | Tue:-5 | Wed:-4 | Thu:-3 | Fri:-2 | Sat:-1 | Sun:-7

=== GENERAL 13-POINT CHECKLIST (sports mode OFF) ===
Apply before every output:
1. PERSONS: quality/profession BEFORE name for each person — check individually
2. ORGANIZATIONS: descriptor (type/political orientation) present
3. COMPANIES: lowercase (except unpronounceable acronyms)
4. ATTRIBUTION (L)/(R): 2 named + no positioning -> (L)/(R). Specific -> use it. 3+ LtoR -> (LtoR)
5. VERB: main verb present and correctly conjugated
6. SPORT MENTION: if sports context -> sport explicitly named
7. STADIUM: missing -> search. Deceased person -> ASCII dash
8. WARM-UP/TRAINING: correct verbs only
9. REGIONAL PRECISION: preserve if present
10. POLITICAL PARTY: never translate + add/preserve abbreviation
11. STRUCTURE: location + date at end
12. DATE FORMAT: [Month] [day], [year] — no day name
13. ASCII: all dashes -, apostrophes ', quotes " "

=== FINAL TECHNICAL FILTER ===
Apply automatically before any output:
- All dashes: ASCII -
- All quotes: ASCII " "
- All apostrophes: ASCII '
- No non-ASCII typographic characters`;

let apiKey = localStorage.getItem('afp_api_key') || '';
let sessionDate = '';
let sportsMode = false;
let templateMode = false;
let conversationHistory = [];
let lastCaption = '';

// Init
if (apiKey) {
  document.getElementById('api-key-input').value = apiKey;
  document.getElementById('key-status-btn').style.display = 'block';
  document.getElementById('api-bar').style.display = 'none';
  enableSend();
}

// Set today's date as default
const today = new Date();
const yyyy = today.getFullYear();
const mm = String(today.getMonth()+1).padStart(2,'0');
const dd = String(today.getDate()).padStart(2,'0');
document.getElementById('session-date-input').value = `${yyyy}-${mm}-${dd}`;

function saveKey() {
  apiKey = document.getElementById('api-key-input').value.trim();
  if (!apiKey) return;
  localStorage.setItem('afp_api_key', apiKey);
  document.getElementById('key-status-btn').style.display = 'block';
  document.getElementById('api-bar').style.display = 'none';
  enableSend();
}

function enableSend() {
  document.getElementById('send-btn').disabled = false;
}

function startSession() {
  const dateVal = document.getElementById('session-date-input').value;
  if (!dateVal) return;
  const d = new Date(dateVal + 'T12:00:00');
  const options = { year: 'numeric', month: 'long', day: 'numeric' };
  sessionDate = d.toLocaleDateString('en-US', options);
  sendCommand(`on ${sessionDate}`);
}

function startSports() {
  if (!sessionDate) { alert('Start a session first'); return; }
  sendCommand(`sport on ${sessionDate}`);
  sportsMode = true;
  updateModeDisplay();
}

function promptMatch() {
  const t = prompt('Match: Team A vs Team B');
  if (t) sendCommand(`match ${t}`);
}
function promptTraining() {
  const t = prompt('Training team:');
  if (t) sendCommand(`training ${t}`);
}
function promptPresser() {
  const t = prompt('Press conference team:');
  if (t) sendCommand(`presser ${t}`);
}

function clearInput() {
  document.getElementById('source-input').value = '';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function sendCommand(cmd) {
  document.getElementById('main-input').value = cmd;
  sendMessage();
}

function updateModeDisplay() {
  const el = document.getElementById('mode-display');
  el.style.display = 'block';
  if (sportsMode) {
    el.textContent = 'SPORTS MODE ON';
    el.className = 'mode-indicator sport-mode';
  } else if (templateMode) {
    el.textContent = 'TEMPLATE MODE ON';
    el.className = 'mode-indicator template-mode';
  } else if (sessionDate) {
    el.textContent = 'NORMAL MODE';
    el.className = 'mode-indicator';
  } else {
    el.style.display = 'none';
  }
}

function updateStatus(state) {
  const dot = document.getElementById('status-dot');
  const text = document.getElementById('status-text');
  const display = document.getElementById('session-display');

  if (state === 'loading') {
    dot.className = 'status-dot loading';
    text.textContent = 'processing';
  } else if (state === 'active') {
    dot.className = 'status-dot active';
    text.textContent = 'session active';
    if (sessionDate) {
      display.style.display = 'block';
      display.textContent = sessionDate;
    }
  } else {
    dot.className = 'status-dot';
    text.textContent = 'no session';
    display.style.display = 'none';
  }
}

async function sendMessage() {
  const inputEl = document.getElementById('main-input');
  const sourceEl = document.getElementById('source-input');

  let userText = inputEl.value.trim();
  if (!userText && sourceEl.value.trim()) {
    userText = sourceEl.value.trim();
  }
  if (!userText) return;
  if (!apiKey) { alert('Please enter your API key first.'); return; }

  // Detect mode changes from commands
  const cmd = userText.toLowerCase().trim();
  if (cmd === 'out') { sportsMode = false; templateMode = false; updateModeDisplay(); }
  if (cmd === 'template' || cmd === 'templates') { templateMode = true; updateModeDisplay(); }
  if (cmd.startsWith('sport on')) { sportsMode = true; updateModeDisplay(); }
  if (cmd.startsWith('on ')) {
    sessionDate = userText.substring(3);
    updateStatus('active');
    updateModeDisplay();
  }
  if (cmd === 'off') { sessionDate = ''; updateStatus('idle'); updateModeDisplay(); }

  inputEl.value = '';

  // Show user message
  showMessage('user', userText);
  document.getElementById('empty-state')?.remove();
  document.getElementById('send-btn').disabled = true;
  updateStatus('loading');

  // Build history
  conversationHistory.push({ role: 'user', content: userText });

  // Inject session context into system
  const systemWithDate = sessionDate
    ? SYSTEM_PROMPT + `\n\n=== CURRENT SESSION ===\nSession date: ${sessionDate}\nSports mode: ${sportsMode ? 'ACTIVE' : 'inactive'}\nTemplate mode: ${templateMode ? 'ACTIVE' : 'inactive'}`
    : SYSTEM_PROMPT;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01' },
      body: JSON.stringify({
        model: 'claude-opus-4-6',
        max_tokens: 1024,
        system: systemWithDate,
        messages: conversationHistory
      })
    });

    const data = await response.json();

    if (data.error) {
      showMessage('error', 'API Error: ' + data.error.message);
      conversationHistory.pop();
    } else {
      const reply = data.content.map(b => b.text || '').join('');
      conversationHistory.push({ role: 'assistant', content: reply });
      lastCaption = reply;

      // Detect alert in reply
      const isAlert = reply.toLowerCase().startsWith('alert:');
      showMessage('assistant', reply, isAlert);
      document.getElementById('copy-btn').style.display = 'block';
    }

  } catch(err) {
    showMessage('error', 'Network error: ' + err.message);
    conversationHistory.pop();
  }

  document.getElementById('send-btn').disabled = false;
  if (sessionDate) updateStatus('active');
  else updateStatus('idle');
}

function showMessage(role, text, isAlert) {
  const area = document.getElementById('output-area');
  const div = document.createElement('div');
  div.className = `message ${role === 'user' ? 'user-message' : ''}`;

  const roleEl = document.createElement('div');
  roleEl.className = 'message-role';
  roleEl.textContent = role === 'user' ? '▸ input' : role === 'error' ? '⚠ error' : '◆ afp output';

  const contentEl = document.createElement('div');
  contentEl.className = 'message-content' + (isAlert ? ' alert-msg' : role === 'assistant' ? ' caption-out' : '');
  contentEl.textContent = text;

  div.appendChild(roleEl);
  div.appendChild(contentEl);
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function copyLast() {
  if (!lastCaption) return;
  navigator.clipboard.writeText(lastCaption).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy last', 1500);
  });
}
</script>
</body>
